kind = "web"
previewPath = "/"
title = "PureGold Trading"
version = "1.0.0"
id = "artifacts/puregold"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23176

[services.development]
run = "pnpm --filter @workspace/puregold run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/puregold", "run", "build" ]
publicDir = "artifacts/puregold/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23176"
BASE_PATH = "/"

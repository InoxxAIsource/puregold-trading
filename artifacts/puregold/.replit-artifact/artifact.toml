kind = "web"
previewPath = "/"
title = "PureGold Trading"
version = "1.0.0"
id = "artifacts/puregold"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23176

[services.development]
run = "pnpm --filter @workspace/puregold run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/puregold", "run", "build" ]

[services.production.run]
args = ["node", "artifacts/puregold/serve.mjs"]

[services.production.run.env]
NODE_ENV = "production"

[services.production.health.startup]
path = "/"

[services.env]
PORT = "23176"
BASE_PATH = "/"
